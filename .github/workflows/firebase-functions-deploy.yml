name: Deploy Cloud Functions to Firebase

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # TODO Phase 7: switch to npm ci once functions/package-lock.json is generated locally
      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Build TypeScript
        working-directory: functions
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATTAYA_RENT_A_CAR_REBUILD }}

      - name: Deploy Cloud Functions
        run: |
          firebase deploy --only functions \
            --project pattaya-rent-a-car-rebuild \
            --non-interactive
